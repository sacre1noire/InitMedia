name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: []   # no explicit dep — CI runs in parallel; add "needs: [ci-job]" if you want to block on it
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/InitMedia

            echo "==> Pulling latest code"
            git pull origin master

            echo "==> Rebuilding containers"
            docker compose --env-file .env.production up -d --build

            echo "==> Running new migrations (if any)"
            if [ -x ./scripts/migrate.sh ]; then
              ./scripts/migrate.sh
            fi

            echo "==> Checking health"
            sleep 3
            curl -sf http://localhost:8080/health && echo " backend healthy" \
              || echo " WARNING: health check failed — check logs"

            echo "==> Done"
